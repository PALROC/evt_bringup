CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_SPI=y

# Bigger log buffer — the persistence test's hexdumps + LOG_INFs
# were overflowing the default 1 KB queue, which is what made RTT
# go silent partway through. 8 KB is plenty of headroom.
CONFIG_LOG_BUFFER_SIZE=8192

# Hand SPIM00 and GPIO2 back from TF-M to the NS app. Without these
# the /ns build bus-faults on first SPIM register access (we saw
# `Failed to initialize nrfx driver: 0bad0004` + SECURE FAULT at 0x4).
# Same mechanism your board's _ns_defconfig uses to release uart30
# (CONFIG_NRF_UARTE30_SECURE=n).
#   SPIM00 -> the shared-flash SPI peripheral
#   GPIO2  -> the port for CS=P2.5 (we drive it manually via cs.gpio)
CONFIG_NRF_SPIM00_SECURE=n
CONFIG_NRF_GPIO2_SECURE=n
# Also release gpio1 (the second cs-gpios entry on spi00 lives there)
# and the high-frequency clock (SPIM00 is the FAST instance on L15 —
# needs HFCLK128M, which is otherwise TF-M-owned).
CONFIG_NRF_GPIO1_SECURE=n
CONFIG_NRF_OSCILLATORS_SECURE=n

# RTT console — routes printk()/LOG_INF() to RTT channel 0 via SWD,
# matches the rest of the bring-up apps.
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Same RC clock + no LFXO setup as the L15 bring-up uses.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n

CONFIG_MAIN_STACK_SIZE=4096

# LOG_MODE_IMMEDIATE made the bus-poll loop crash mid-erase; back to
# deferred mode. We use printk() for synchronous breadcrumb prints
# around each flash op instead, which is lighter and bypasses the
# log subsystem entirely.

# Print fault details (PC, LR, fault address, etc.) instead of just
# hanging silently on a hard-fault during the erase.
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_EXCEPTION_DEBUG=y
