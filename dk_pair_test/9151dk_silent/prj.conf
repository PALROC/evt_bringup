# Deliberately minimal — boot Zephyr + TF-M, print a banner, sleep
# forever. NO SPI, NO GPIO output drivers, nothing that could drive
# the shared SPI3 bus pins.
#
# With CONFIG_SPI not set, the Zephyr SPI subsystem isn't compiled in
# at all → no driver auto-initializes SPI3 → SPIM3's PSEL registers
# stay at their reset defaults (disconnected) → P0.13/14/15/20 all
# remain as default high-Z GPIO inputs. The L15 owns the bus.

CONFIG_LOG=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y

CONFIG_MAIN_STACK_SIZE=1024
