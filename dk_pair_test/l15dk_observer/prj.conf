CONFIG_LOG=n
CONFIG_GPIO=y
CONFIG_SPI=y

CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y

# RC LFCLK source (no LFXO needed for this minimal test).
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n

# TF-M peripheral releases (only needed when MODE_IDLE=0 in main.c,
# but harmless when idle).
CONFIG_NRF_SPIM00_SECURE=n
CONFIG_NRF_GPIO2_SECURE=n
CONFIG_NRF_GPIO1_SECURE=n     # CS = P1.10 lives in port 1
CONFIG_NRF_OSCILLATORS_SECURE=n

CONFIG_MAIN_STACK_SIZE=2048
