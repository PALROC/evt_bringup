# One-time nRF Cloud device provisioning overlay.
#
# The nrf_provisioning library (RX/TX buffers + CBOR codec + its thread)
# is too heavy to fit in RAM alongside Wi-Fi + the CoAP A-GNSS stack, and
# it's only needed ONCE per board. So provisioning lives here, in an
# overlay you build separately:
#
#   west build -b nrf9151_nova_evt2/nrf9151/ns -d build_provision -p \
#     -- -DCONF_FILE=prj.conf \
#        -DEXTRA_CONF_FILE=overlay-provision.conf \
#        -DBOARD_ROOT=/home/oriol/PALROC_dev/NMS/phase2-hw/palroc_nova
#   west flash -d build_provision
#
# Press Hall 2, wait for "provisioning complete", then build + flash the
# normal demo (prj.conf, no overlay) which uses the installed credentials
# for CoAP A-GNSS. provisioning_run() is compiled to a cert-check stub
# when this overlay is absent (CONFIG_NRF_PROVISIONING off).

CONFIG_NRF_PROVISIONING=y
CONFIG_NRF_PROVISIONING_COAP=y
CONFIG_NRF_PROVISIONING_AUTO_INIT=n
# Bundle the provisioning-service root CA; installed to tag 42 if empty.
CONFIG_NRF_PROVISIONING_WITH_CERT=y
CONFIG_NRF_PROVISIONING_ROOT_CA_SEC_TAG=42

# Provisioning message codec (CBOR)
CONFIG_NRF_PROVISIONING_CODEC=y
CONFIG_NRF_PROVISIONING_CBOR=y
CONFIG_ZCBOR=y
CONFIG_NRF_PROVISIONING_CBOR_RECORDS=20
CONFIG_NRF_PROVISIONING_RX_BUF_SZ=4096
CONFIG_NRF_PROVISIONING_TX_BUF_SZ=4096
CONFIG_NRF_PROVISIONING_CODEC_AT_CMD_LEN=2048

# The provisioning lib reboots after applying credentials, so sys_reboot()
# must be linkable.
CONFIG_REBOOT=y
