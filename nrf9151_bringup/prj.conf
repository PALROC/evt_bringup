# nRF9151 base configuration. Pass to west as -DCONF_FILE=prj9151.conf.
#
# IMPORTANT: For the nRF54L15 build, use prj54l15.conf instead. The L15
# needs extra app-level overrides (explicit RTT/console config and the
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y / _XTAL=n pair) that the nova
# board's defconfig values get shadowed without — symptom is timestamps
# stuck at 00:00:00 and the scheduler frozen even though UART RX still
# logs.

CONFIG_GPIO=y

# DUT UART (nrf-sw-lpuart: UARTE + REQ/RDY GPIO handshake)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_NRF_SW_LPUART=y
CONFIG_NRF_SW_LPUART_INT_DRIVEN=y

# RTT (available on all boards via J-Link)
CONFIG_USE_SEGGER_RTT=y

CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
