# RTT console — routes printk() to RTT channel 0 via SWD, no UART needed
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y

# Disable UART console
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

CONFIG_LOG=y
CONFIG_CONSOLE=y

# %f support in LOG_INF/test_report — needed for the IMU accel m/s²
# readout. Picolibc defaults to integer-only printf to save flash.
CONFIG_CBPRINTF_FP_SUPPORT=y

# Inter-MCU link to the L15: nrf-sw-lpuart on the `dut-uart` alias
# (uart0 + REQ/RDY GPIO handshake — board-level wiring already done in
# the nova 9151 dtsi). The underlying UART_0_ASYNC + TIMER2 config
# lives in the board's _ns_defconfig; only the driver enable belongs
# here at app level.
CONFIG_NRF_SW_LPUART=y
CONFIG_NRF_SW_LPUART_INT_DRIVEN=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Bring-up: i2c2 + spi3 + GPIO for raw probes
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_REGULATOR=y
CONFIG_SENSOR=y

# nPM1300 PMIC — read VBAT/NTC/IBAT via the npm13xx charger sensor driver.
# (Kconfig path is npm13xx, NOT npm1300 — driver was renamed in NCS 3.3.0.
# Note: the charger Kconfig is CONFIG_NPM1300_CHARGER, with no SENSOR_
# prefix — the sensor framework picks it up via the binding.)
CONFIG_MFD=y
CONFIG_MFD_NPM1300=y
CONFIG_REGULATOR_NPM1300=y
CONFIG_NPM1300_CHARGER=y

# Step 4 — minimal modem probe: just init + one AT command, no LTE attach.
CONFIG_NRF_MODEM_LIB=y

# Step 5 — LTE attach (NB-IoT preferred, Telekom DE).
# Step 10 — GNSS added to system_mode so AT+CFUN=31 actually has something
# to activate. NETWORK_MODE_NBIOT_GPS = NB-IoT + GNSS in system_mode (the
# plain NETWORK_MODE_NBIOT excludes GNSS, which made AT+CFUN=31 fail with
# CME error 65536 "ERROR" because there was no GNSS subsystem to wake up).
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=y
CONFIG_MAIN_STACK_SIZE=4096

# Diagnostics for the silent-reset during attach
CONFIG_HWINFO=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_INF=y
CONFIG_NRF_MODEM_LIB_LOG_LEVEL_INF=y
# 2048 (was 4096) — trimmed to claw back RAM for the nRF Cloud/CoAP
# stack added for A-GNSS. Log throughput is unaffected for our cadence.
CONFIG_LOG_BUFFER_SIZE=2048

# Step 13 — nRF7000 Wi-Fi (passive scan only, per the supply-margin
# constraint on nPM1300 BUCKs ~250 mA; see steps.md step 9).
#
# IMPORTANT: in NCS 3.x the nRF70 operating-mode + firmware-handling
# Kconfigs are FORCED from sysbuild — whatever we put in this file for
# CONFIG_WIFI_NRF70 / CONFIG_NRF70_* / CONFIG_NRF_WIFI_PATCHES_* is
# overridden by the SB_CONFIG_* equivalents in sysbuild.conf. Setting
# them here is at best redundant and at worst causes a duplicate-CMake-
# target build error. Only the generic networking + Wi-Fi mgmt + heap
# stay here.
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_WIFI=y

# Heap for nrf70 patch + scratch buffers. Iterated down to 56 KB on the
# 9151 + TF-M-NS build (150K -> 96K -> 56K).
CONFIG_HEAP_MEM_POOL_SIZE=57344
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# nRF7000's OTP MAC is unprogrammed on dev boards (`MAC addr not
# programmed in OTP`). Ask the driver to invent a locally-administered
# random MAC at startup so the netif can start. Removed for production
# builds (parts come MAC-provisioned from Nordic).
CONFIG_WIFI_RANDOM_MAC_ADDRESS=y

# === A-GNSS Stage B: nRF Cloud device provisioning (OTA cert install) ===
# One-time per board: after the device is claimed on nRF Cloud with an
# auto-onboarding rule, the nrf_provisioning lib pulls KEYGEN + cert
# commands over CoAP and writes the device cert/key + CA to the modem
# keystore at the nRF Cloud sec_tag (16842753). Idempotent in firmware:
# provisioning_run() skips if the client cert already exists.
CONFIG_NRF_CLOUD=y
CONFIG_NRF_PROVISIONING=y
CONFIG_NRF_PROVISIONING_COAP=y
# AUTO_INIT=n -> we init + trigger manually from provisioning_run()
# (3.0.2 has no SCHEDULED symbol; manual trigger is the non-auto path).
CONFIG_NRF_PROVISIONING_AUTO_INIT=n
# Bundle the provisioning-service root CA in the image; installed to its
# sec_tag only if empty. 42 is the provisioning service CA tag (distinct
# from the nRF Cloud CoAP device-cred sec_tag 16842753).
CONFIG_NRF_PROVISIONING_WITH_CERT=y
CONFIG_NRF_PROVISIONING_ROOT_CA_SEC_TAG=42
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_INTERNAL_UUID=y

# Device identity / JWT / key management for provisioning + claiming
CONFIG_MODEM_JWT=y
CONFIG_MODEM_ATTEST_TOKEN=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_DATE_TIME=y

# Modem info — the provisioning CoAP auth path uses the modem firmware
# version (CONFIG_MODEM_INFO_BUFFER_SIZE). Keep the extra device/network/
# SIM fields off to stay lean.
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_DEVICE=n
CONFIG_MODEM_INFO_ADD_NETWORK=n
CONFIG_MODEM_INFO_ADD_SIM=n

# Provisioning message codec (CBOR)
CONFIG_NRF_PROVISIONING_CODEC=y
CONFIG_NRF_PROVISIONING_CBOR=y
CONFIG_ZCBOR=y
CONFIG_NRF_PROVISIONING_CBOR_RECORDS=20
CONFIG_NRF_PROVISIONING_RX_BUF_SZ=4096
CONFIG_NRF_PROVISIONING_TX_BUF_SZ=4096
CONFIG_NRF_PROVISIONING_CODEC_AT_CMD_LEN=2048

# Sockets for the CoAP client + date_time/SNTP. Routed to the modem via
# the nRF Modem lib's socket offload (so cloud traffic goes over LTE,
# not the Wi-Fi native stack which coexists for the nRF7000 scan).
CONFIG_NET_SOCKETS=y

# CoAP client used by the provisioning lib (and later nRF Cloud CoAP)
CONFIG_COAP=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=192
CONFIG_COAP_CLIENT=y
CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_MESSAGE_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=6144
CONFIG_COAP_CLIENT_THREAD_PRIORITY=0

# Settings storage for provisioning state — no storage partition exists
# in the board DT, so let the partition manager auto-carve settings_
# storage from the app region (NVS on internal flash).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# The nrf_provisioning lib reboots after applying credentials in its
# internal device-mode handler, so sys_reboot() must be linkable.
CONFIG_REBOOT=y
