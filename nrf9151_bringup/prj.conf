# RTT console — routes printk() to RTT channel 0 via SWD, no UART needed
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y

# Disable UART console
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

CONFIG_LOG=y
CONFIG_CONSOLE=y

# Bring-up: i2c2 + spi3 + GPIO for raw probes
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_REGULATOR=y
CONFIG_SENSOR=y

# nPM1300 PMIC — read VBAT/NTC/IBAT via the npm13xx charger sensor driver.
# (Kconfig path is npm13xx, NOT npm1300 — driver was renamed in NCS 3.3.0.
# Note: the charger Kconfig is CONFIG_NPM13XX_CHARGER, with no SENSOR_
# prefix — the sensor framework picks it up via the binding.)
CONFIG_MFD=y
CONFIG_MFD_NPM13XX=y
CONFIG_REGULATOR_NPM13XX=y
CONFIG_NPM13XX_CHARGER=y

# Step 4 — minimal modem probe: just init + one AT command, no LTE attach.
CONFIG_NRF_MODEM_LIB=y

# Step 5 — LTE attach (NB-IoT preferred, Telekom DE).
# Step 10 — GNSS added to system_mode so AT+CFUN=31 actually has something
# to activate. NETWORK_MODE_NBIOT_GPS = NB-IoT + GNSS in system_mode (the
# plain NETWORK_MODE_NBIOT excludes GNSS, which made AT+CFUN=31 fail with
# CME error 65536 "ERROR" because there was no GNSS subsystem to wake up).
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=y
CONFIG_MAIN_STACK_SIZE=4096

# Diagnostics for the silent-reset during attach
CONFIG_HWINFO=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_INF=y
CONFIG_NRF_MODEM_LIB_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=4096

# Step 13 — nRF7000 Wi-Fi (passive scan only, per the supply-margin
# constraint on nPM1300 BUCKs ~250 mA; see steps.md step 9 / project
# memory project_palroc_nrf7000_supply.md).
#
# IMPORTANT: in NCS 3.3.0 the nRF70 enablement options are FORCED from
# sysbuild — see sysbuild.conf for SB_CONFIG_WIFI_NRF70 /
# SB_CONFIG_WIFI_NRF70_SCAN_ONLY / SB_CONFIG_WIFI_PATCHES_EXT_FLASH_DISABLED.
# Setting CONFIG_WIFI_NRF70 / CONFIG_NRF70_* / CONFIG_NRF_WIFI_PATCHES_* in
# this file is at best redundant and at worst causes a duplicate-CMake-
# target build error (gen_nrf70_bin_inc collision between
# zephyr/drivers/wifi/nrf_wifi and nrf/subsys/net/lib/nrf70_fw_ext).
# So we leave those out and let sysbuild be the single source of truth.
#
# Only the generic networking + Wi-Fi mgmt + heap stay here.
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_WIFI=y

# Heap for nrf70 patch + scratch buffers. Iterated downward several times
# because the 9151 + TF-M-NS build has limited RAM:
#   150 KB → blew by 39 KB
#    96 KB → still blew by 37 KB once the full nrf70 driver linked in
#    56 KB → fits, scan still works (Nordic forum posts confirm this is
#            tight-but-workable on 91-class hosts; if scan fails at
#            runtime with -ENOMEM, push back up to 64 KB or trim
#            elsewhere).
CONFIG_HEAP_MEM_POOL_SIZE=57344
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# nRF7000's OTP MAC is unprogrammed on this dev board (`MAC addr not
# programmed in OTP` log). Ask the driver to invent a locally-administered
# random MAC at startup so the netif can start. On production boards
# Nordic factory-provisions a real MAC, so this would be removed for
# production builds.
CONFIG_WIFI_RANDOM_MAC_ADDRESS=y
