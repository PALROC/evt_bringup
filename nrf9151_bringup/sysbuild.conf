# Disable MCUboot for bring-up builds.
# Without MCUboot, the app runs directly from address 0x0.
SB_CONFIG_BOOTLOADER_MCUBOOT=n

# nRF7000 Wi-Fi enablement. Per NCS 3.x docs, the nRF70 operating-mode
# and firmware-handling Kconfigs are FORCED from sysbuild — whatever we
# put in prj.conf for CONFIG_WIFI_NRF70 / CONFIG_NRF70_SCAN_ONLY /
# CONFIG_NRF_WIFI_PATCHES_BUILTIN is overridden by these SB_CONFIG_*
# equivalents. Sysbuild is the single source of truth for nrf70.
SB_CONFIG_WIFI_NRF70=y
SB_CONFIG_WIFI_NRF70_SCAN_ONLY=y
SB_CONFIG_WIFI_PATCHES_EXT_FLASH_DISABLED=y
