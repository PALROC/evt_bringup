# Disable MCUboot for bring-up builds.
# Without MCUboot, the app runs directly from address 0x0.
SB_CONFIG_BOOTLOADER_MCUBOOT=n

# nRF7000 Wi-Fi enablement. Per NCS 3.3.0 docs, the nRF70 operating-mode
# and firmware-handling Kconfigs are FORCED from the sysbuild level —
# whatever we put in the app's prj.conf for CONFIG_WIFI_NRF70 /
# CONFIG_NRF70_SCAN_ONLY / CONFIG_NRF_WIFI_PATCHES_BUILTIN is overridden
# by these SB_CONFIG_* equivalents. That's why our prj.conf settings
# silently went nowhere — sysbuild reset them. The "Sysbuild forced
# options" doc lists every one of these as application-overrides.
SB_CONFIG_WIFI_NRF70=y
SB_CONFIG_WIFI_NRF70_SCAN_ONLY=y
SB_CONFIG_WIFI_PATCHES_EXT_FLASH_DISABLED=y
