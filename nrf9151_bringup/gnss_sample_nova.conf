# Overlay to run the NCS cellular/gnss sample on the palroc nova EVT2
# board (A/B vs the nRF9151 DK). Two things the stock sample needs here:
#
# 1. COEX0 -> external GNSS LNA enable. The modem_antenna library applies
#    AT%XCOEX0 EARLY (before any modem activity), which is exactly what
#    the %XCOEX0 datasheet requires (configuring it late = COEX0 stays
#    0 V = LNA off, the bug we hit in the bring-up firmware).
#    GNSS_ONBOARD's default COEX0 string is "AT%XCOEX0=1,1,1565,1586"
#    (GPS L1, COEX0 high during GNSS RX) — exactly our LNA control.
#
#    These are now also nova-board defaults (Kconfig.defconfig), but
#    keep them here as a hard override so the sample is self-contained.
CONFIG_MODEM_ANTENNA=y
CONFIG_MODEM_ANTENNA_GNSS_ONBOARD=y

# Turn the modem_antenna lib's DBG log into INFO so we actually see the
# "Setting configuration: AT%XCOEX0=..." line at boot — proves the hook
# fired and the command was sent (don't have to guess).
CONFIG_MODEM_ANTENNA_LOG_LEVEL_DBG=y

# NOTE: Thingy:91 X also sets AT%XMIPIRFFEDEV / AT%XMIPIRFFECTRL for its
# MIPI-RFFE-controlled antenna tuner. User confirmed our EVT2 does NOT
# include that RFFE tuner IC (and the Thingy's npm6001/BLE/COEX2 side
# isn't on our board either), so these commands are not added here.

# 2. Console + logging over RTT — the nova board has no UART console
#    (uart0 is the sw-lpuart link). Read output in the J-Link RTT viewer.
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n