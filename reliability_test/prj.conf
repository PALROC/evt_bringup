# =====================================================================
# Reliability test — periodic CoAP heartbeats over LTE-M
# =====================================================================

# --- Logging via RTT (no UART console on this board) ---------------
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Silence TF-M's secure-log UART (same as in nrf9151_bringup).
CONFIG_TFM_LOG_LEVEL_SILENCE=y

# --- The board's _ns_defconfig enables UART_0_ASYNC for sw-lpuart
# (the inter-MCU link in the bring-up firmware). This app doesn't
# use sw-lpuart, but board defaults can't be removed — so we just
# satisfy the dependency to silence the warnings. The actual async
# UART driver won't initialize anything because we don't reference it.
CONFIG_UART_ASYNC_API=y
CONFIG_NRFX_TIMER2=y

# --- Modem + LTE link control --------------------------------------
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M=y
# We don't set LTE_AUTO_INIT_AND_CONNECT — the default (n) is correct
# and we manage the lifecycle from main() ourselves.

# Enable PSM (Power Saving Mode) so the modem can sleep deep between
# heartbeats while keeping its LTE context. Requires the PSM module
# Kconfig to be on first.
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00000110"   # T3412 = 6 * 30 min = 180 min
CONFIG_LTE_PSM_REQ_RAT="00000001"     # T3324 = 1 * 2 s = 2 s

# --- Networking / IP / sockets -------------------------------------
# The modem owns the IP stack via offload, so we DON'T enable
# NET_NATIVE. DNS resolution is done by the modem too — Zephyr's
# DNS_RESOLVER subsystem requires NET_NATIVE so we leave it off and
# use the offloaded getaddrinfo() in the socket layer.
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_LOG=y

# --- CoAP client ---------------------------------------------------
# CONFIG_COAP=y is what we actually need (low-level packet API used
# by coap_client.c). COAP_CLIENT is a higher-level helper we don't
# use; left off to silence the experimental-symbol warning.
CONFIG_COAP=y

# --- GPIO (for red LED blink on heartbeat send) --------------------
CONFIG_GPIO=y

# --- PMIC for VBAT readings ----------------------------------------
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_REGULATOR=y
CONFIG_MFD=y
CONFIG_MFD_NPM1300=y
# Note: the charger Kconfig is CONFIG_NPM1300_CHARGER with no SENSOR_
# prefix — it lives at zephyr/drivers/sensor/nordic/npm1300_charger/Kconfig
CONFIG_NPM1300_CHARGER=y

# --- HWINFO for chip-ID identification -----------------------------
CONFIG_HWINFO=y

# --- CBOR encoder --------------------------------------------------
CONFIG_ZCBOR=y

# --- General Zephyr knobs ------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_REBOOT=y

# --- Modem info for RSRP / RAT readouts ----------------------------
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y
