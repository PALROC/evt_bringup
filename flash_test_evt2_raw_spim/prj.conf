# We are NOT using the Zephyr SPI driver. Talk directly to SPIM3
# registers via nrf_spim HAL macros.
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y

# Bit-bang preamble (proves chip + traces alive) needs GPIO.
CONFIG_GPIO=y

# Deliberately NOT enabling:
#   CONFIG_SPI      — Zephyr SPI subsystem (the layer we're bypassing)
#   CONFIG_NRFX_SPIM3 — even nrfx driver layer not needed; we use the
#                      HAL directly

CONFIG_MAIN_STACK_SIZE=2048
