# Absolutely the minimum needed to do SPI3 on EVT2.
# Deliberately NO modem, NO networking, NO bluetooth, NO PMIC driver,
# NO sw-lpuart. Anything that touches a peripheral other than SPI3 is
# excluded.

CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y

CONFIG_SPI=y
CONFIG_GPIO=y

CONFIG_MAIN_STACK_SIZE=2048
