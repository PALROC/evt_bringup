# Minimal config for the EVT2 9151-side SPI flash JEDEC test.
# DISABLE the log subsystem entirely — its deferred queue thread keeps
# racing printk on the RTT buffer and chopping output mid-word ("reg
# du\nm"). For this diagnostic we only need printk -> RTT, no logging.
CONFIG_LOG=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y

CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_MAIN_STACK_SIZE=2048

# Bigger log buffer + immediate flushing so the bit-bang result is
# never dropped to the deferred queue (we hit that exact issue on
# flash_test_l15_evt2 — same fix here).
CONFIG_LOG_BUFFER_SIZE=8192

# CRITICAL: route printk() DIRECTLY to RTT instead of through the log
# subsystem. With CONFIG_LOG=y the default is CONFIG_LOG_PRINTK=y, which
# pushes printk lines into the deferred log queue and they get dropped
# under burst load (exactly what was eating the bit-bang result line).
# Setting this to n makes printk go straight to the RTT console — truly
# synchronous, can't be dropped.
CONFIG_LOG_PRINTK=n
