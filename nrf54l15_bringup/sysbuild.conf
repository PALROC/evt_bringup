# Disable MCUboot for bring-up builds.
# Without MCUboot, the app runs directly from address 0x0.
SB_CONFIG_BOOTLOADER_MCUBOOT=n

# nRF7000 Wi-Fi enablement lives on the 9151 side on EVT1 — see
# evt_bringup/nrf9151_bringup/sysbuild.conf for the SB_CONFIG_WIFI_*
# entries. The L15 doesn't host Wi-Fi here.
