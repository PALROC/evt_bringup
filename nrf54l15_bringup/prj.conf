CONFIG_LOG=y
CONFIG_GPIO=y

# RTT console — routes printk() to RTT channel 0 via SWD, no UART needed
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BUFFER_SIZE=4096

# Disable UART console
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n

# Inter-MCU link to the 9151: nrf-sw-lpuart on the `dut-uart` alias
# (uart30 + REQ/RDY GPIO handshake — board-level wiring already done
# in the nova L15 dtsi). The underlying UART_30_ASYNC config lives in
# the board's _ns_defconfig; only the driver enable belongs here.
CONFIG_NRF_SW_LPUART=y
CONFIG_NRF_SW_LPUART_INT_DRIVEN=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# BLE — non-connectable broadcaster, just to validate the radio + HFXO from
# a phone scanner without depending on RTT being readable.
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n
CONFIG_BT_DEVICE_NAME="palroc-l15"

# Headroom for the BT stack (non-connectable beacons are light, but the
# defaults can be tight on first turn-on). 2 KB heap is fine — no Wi-Fi
# stack runs here on EVT1; the nrf70 driver lives on the 9151 side. See
# evt_bringup/nrf9151_bringup/prj.conf for the networking + heap +
# sysbuild SB_CONFIG_WIFI_NRF70 entries.
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=2048
