# nRF54L15 base configuration. Pass to west as -DCONF_FILE=prj54l15.conf.
#
# This file is REQUIRED for the L15 build — do not use the bare prj.conf
# / prj9151.conf here. The L15 nova board's defconfig values for RTT
# console and K32SRC clock source get shadowed by upstream configs, so
# the overrides have to live at the app level. Symptom of using the
# 9151 conf on the L15: timestamps stuck at 00:00:00, periodic timer
# never fires, workqueue items never run, even though UART RX ISRs do
# log. Root cause is no LFCLK source -> GRTC has no tick.
#
# For the nRF9151 build, use prj9151.conf instead.

CONFIG_GPIO=y

# DUT UART (nrf-sw-lpuart: UARTE + REQ/RDY GPIO handshake)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_NRF_SW_LPUART=y
CONFIG_NRF_SW_LPUART_INT_DRIVEN=y

# RTT (available on all boards via J-Link)
CONFIG_USE_SEGGER_RTT=y

CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Low-frequency clock source: use the internal RC, NOT the LFXO crystal.
# The L15 nova board has no 32 kHz crystal soldered on XL1/XL2 — without
# this pair the K32SRC choice defaults to XTAL, LFCLK never starts, GRTC
# has no tick source, and the scheduler freezes (timestamps stuck at
# 00:00:00, periodic timers don't fire, workqueue items never run — but
# UART RX ISRs still fire because UARTE runs off HFCLK, which masquerades
# as "partly working"). Match the bring-up project's working setup.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n


# RTT console — routes printk() to RTT channel 0 via SWD, no UART needed
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BUFFER_SIZE=4096

# Disable UART console
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

CONFIG_CONSOLE=y