CONFIG_LOG=y
CONFIG_GPIO=y

# RTT console — routes printk() to RTT channel 0 via SWD, no UART needed
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BUFFER_SIZE=4096

# Disable UART console
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

CONFIG_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n
# BLE — non-connectable broadcaster, just to validate the radio + HFXO from
# a phone scanner without depending on RTT being readable.
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n
CONFIG_BT_DEVICE_NAME="palroc-l15"

# Some headroom for the BT stack (non-connectable beacons are light, but
# the defaults can be tight on first turn-on).
CONFIG_MAIN_STACK_SIZE=2048

# nRF7000 Wi-Fi — moved here from the 9151 side. The chip's SPI is wired
# to the L15 on EVT1 (the 9151 hosted it during a temporary firmware
# workaround). nRF70 enablement is FORCED from sysbuild on NCS 3.x —
# see sysbuild.conf for SB_CONFIG_WIFI_NRF70 / NRF70_SCAN_ONLY /
# PATCHES_EXT_FLASH_DISABLED. Only the generic networking + Wi-Fi mgmt
# + heap live in this file.
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_WIFI=y

# Heap sized for the nrf70 patch + scratch buffers. Same 56 KB the 9151
# bring-up converged on. Bump if the L15 build hits -ENOMEM during the
# scan (the L15 has different RAM constraints than the 9151 + TF-M-NS
# combo this was originally tuned against).
CONFIG_HEAP_MEM_POOL_SIZE=57344
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# nRF7000's OTP MAC is unprogrammed on the dev boards (`MAC addr not
# programmed in OTP` log). Ask the driver to invent a locally-administered
# random MAC at startup so the netif can start. Production boards have
# Nordic factory-provisioned MACs, so this would go for prod builds.
CONFIG_WIFI_RANDOM_MAC_ADDRESS=y
